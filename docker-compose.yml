version: '3.9'

services:

  # ─── SQL Server ────────────────────────────────────────────────────────────
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: pv-sqlserver
    environment:
      SA_PASSWORD: "YourStrong!Passw0rd"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql
    healthcheck:
      test: ["CMD", "/opt/mssql-tools/bin/sqlcmd", "-S", "localhost",
             "-U", "sa", "-P", "YourStrong!Passw0rd", "-Q", "SELECT 1"]
      interval: 10s
      retries: 10
      start_period: 30s

  # ─── API ───────────────────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pv-api
    environment:
      ASPNETCORE_ENVIRONMENT: "Production"
      ASPNETCORE_URLS: "http://+:5000"
      ConnectionStrings__DefaultConnection: >
        Server=sqlserver,1433;Database=PasswordVaultDB;
        User Id=sa;Password=YourStrong!Passw0rd;
        TrustServerCertificate=True;
      Security__EncryptionKey: "CHANGE_ME_32_CHAR_SECRET_KEY_HERE"
      Security__JwtSecret: "CHANGE_ME_VERY_LONG_JWT_SECRET_KEY_AT_LEAST_64_CHARS_LONG!!"
      Security__JwtIssuer: "PasswordVaultAPI"
      Security__JwtAudience: "PasswordVaultClient"
      Security__JwtExpiryMinutes: "60"
      AllowedOrigins__0: "http://localhost:4200"
      AllowedOrigins__1: "http://frontend:80"
    ports:
      - "5000:5000"
    depends_on:
      sqlserver:
        condition: service_healthy
    restart: unless-stopped

  # ─── Angular UI (Nginx) ────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend/password-vault-ui
      dockerfile: Dockerfile
    container_name: pv-frontend
    ports:
      - "4200:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  sqldata:
