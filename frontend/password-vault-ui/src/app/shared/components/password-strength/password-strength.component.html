<div class="ps-wrap" *ngIf="password">
  <mat-progress-bar
    mode="determinate"
    [value]="str.pct"
    [style.--mdc-linear-progress-active-indicator-color]="str.color"
  >
  </mat-progress-bar>
  <div class="ps-meta">
    <span class="ps-label" [style.color]="str.color">{{ str.label }}</span>
    <span class="ps-hints" *ngIf="str.score < 4"> Add {{ hints() }} </span>
  </div>
</div>
